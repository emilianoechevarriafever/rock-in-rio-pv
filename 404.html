<!DOCTYPE html>
<html><head>
<title>Redirecting...</title>
<script>
(function(){
  var oldBase = '/rock-in-rio-pv';
  var newOrigin = 'https://feverup.github.io';
  var newBase = '/rock-in-rio-pv';
  var path = window.location.pathname;
  if (path.indexOf(oldBase) === 0) path = path.substring(oldBase.length);
  if (!path || path === '/') path = '/';
  window.location.replace(newOrigin + newBase + path + window.location.search + window.location.hash);
})();
</script>
